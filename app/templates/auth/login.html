{% extends 'base.html' %}

{% block title %}Entrar{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/login.css') }}">
{% endblock %}

{% block body %}
  <main>
    <h1>Entrar</h1>

    <form method="post">
      <div class="form-group">
        <label for="username">Nome de usuário</label>
        <input type="text" name="username" id="username" placeholder="{{ error['username'] if error and error['username'] else 'Informe seu nome de usuário' }}" required>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" name="password" id="password" placeholder="{{ error['password'] if error and error['password'] else 'Informe sua senha' }}" required>
      </div>

      <button type="submit" class="login-button">Entrar</button>

      <a href="{{ url_for('auth.register') }}">Criar conta</a>
    </form>
  </main>
{% endblock %}
