{% extends 'base.html' %}

{% block title %}Tasks{% endblock %}

{% block body %}
  <ul>
    {% for task in tasks %}
      <li>{{ task['task'] }}</li>
    {% endfor %}
  </ul>

  <form method="post">
    <input type="text" name="task" id="task">
    <button type="submit">Adicionar</button>
  </form>
{% endblock %}
