<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hexa Tasker</title>
  <link rel="icon" href="static/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="static/styles/user-page.css">
</head>
<body>
  <h1>Lista de Tarefas</h1>

  <form id="task-list-form">
    <ul id="task-list">

      <template id="task-list-item-template">
        <li class="task-list-item">
          <span class="task-wrapper">
            <input type="checkbox" class="task-checkbox">
          
            <span class="task-text"></span>

            <span class="task-actions">
              <button type="button" class="edit-task-button">Editar</button>
              <button type="button" class="check-task-button">Marcar como concluída</button>
              <button type="button" class="delete-task-button">Excluir</button>
            </span>
          </span>
        </li>
      </template>

      <template id="task-editor-template">
        <span class="task-editor">
          <input type="text" placeholder="Digite sua tarefa" class="task-editor-input">
          <span>
            <button type="button" class="cancel-button">Cancelar</button>
            <button type="submit" class="save-button">Salvar</button>
          </span>
        </span>
      </template>

    </ul>
  </form>

  <form id="new-task-form">
    <input type="text" name="new-task-input" id="new-task-input" placeholder="Digite uma tarefa">
    <button type="submit" id="new-task-button">+</button>
  </form>

  <script type="module" src="static/scripts/main.js"></script>
</body>
</html>
